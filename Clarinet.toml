[project]
name = "fee-filter"
authors = ["Fee Filter Team"]
description = "Dynamic transaction fee management system for Stacks blockchain"
telemetry = false
requirements = []
[contracts.fee-management]
path = "contracts/fee-management.clar"
depends_on = []

[contracts.fee-processor]
path = "contracts/fee-processor.clar"
depends_on = []

[contracts.fee-analytics]
path = "contracts/fee-analytics.clar"
depends_on = []

[contracts.fee-distributor]
path = "contracts/fee-distributor.clar"
depends_on = []

[repl]
costs_version = 2
parser_version = 2

[repl.analysis]
passes = ["check_checker"]

[repl.analysis.check_checker]
strict = false
trusted_sender = false
trusted_caller = false
callee_filter = false
